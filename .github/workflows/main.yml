# <org>.github.io/.github/workflows/deploy.yml
on:
  push:
    branches: [main]
  workflow_dispatch:
  
jobs:
  build-unstyled:
    uses: zenebyte/unstyled/.github/workflows/docs.yml@main
    secrets: inherit

  build-unocss-presets:
    uses: zenebyte/unocss-presets/.github/workflows/docs.yml@main
    secrets: inherit

  assemble-and-deploy:
    needs: [build-unstyled, build-unocss-presets]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4       # root site content

      - uses: actions/download-artifact@v4
        with:
          name: build-unstyled
          path: ./unstyled

      - uses: actions/download-artifact@v4
        with:
          name: build-unocss-presets
          path: ./unocss-presets

      - uses: actions/deploy-pages@v4